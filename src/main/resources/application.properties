spring.application.name=cabinet-medical-chatbot
server.port=${PORT:8080}

# Default profile uses H2 for easy testing.
# To use PostgreSQL: run with --spring.profiles.active=postgres
spring.datasource.url=jdbc:h2:mem:cabinetdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.thymeleaf.cache=false

# Optional Python AI chatbot bridge.
# Example: export CHATBOT_PYTHON_URL=http://127.0.0.1:8000/ask
chatbot.python.url=${CHATBOT_PYTHON_URL:}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cabinet_medical_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional Python AI chatbot bridge.
# Example: export CHATBOT_PYTHON_URL=http://127.0.0.1:8000/ask
chatbot.python.url=${CHATBOT_PYTHON_URL:}

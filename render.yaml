services:
  - type: web
    name: mohamed-cabinet-medical-web
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: cabinet-medical-db
          property: connectionString
      - key: CHATBOT_PYTHON_URL
        value: https://mohamed-cabinet-medical-chatbot-api.onrender.com/ask

  - type: web
    name: mohamed-cabinet-medical-chatbot-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: python_chatbot
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cabinet-medical-db
          property: connectionString
      - key: AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/free
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash

databases:
  - name: cabinet-medical-db
    region: frankfurt
    databaseName: cabinet_medical_db
    user: cabinet_medical_user
    plan: free
